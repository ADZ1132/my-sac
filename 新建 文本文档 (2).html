<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一大福利</title>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 50%, #1a1a1a 100%);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* 黑色粒子 */
        .black-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background: #000000;
            border-radius: 50%;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        /* 黑色圆点 */
        .black-dots {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #333333;
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }
        
        /* 动态线条 */
        .black-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #333333, transparent);
            height: 1px;
            animation: move-line 8s linear infinite;
        }
        
        .line:nth-child(1) { top: 20%; width: 60%; left: -60%; animation-delay: 0s; }
        .line:nth-child(2) { top: 40%; width: 80%; left: -80%; animation-delay: 2s; }
        .line:nth-child(3) { top: 60%; width: 50%; left: -50%; animation-delay: 4s; }
        .line:nth-child(4) { top: 80%; width: 70%; left: -70%; animation-delay: 6s; }
        
        @keyframes move-line {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        /* 几何形状 */
        .black-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .shape {
            position: absolute;
            background: #1a1a1a;
            animation: rotate-shape 10s linear infinite;
        }
        
        .shape:nth-child(1) { top: 10%; left: 5%; width: 100px; height: 100px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
        .shape:nth-child(2) { top: 70%; right: 10%; width: 80px; height: 80px; border-radius: 50%; }
        .shape:nth-child(3) { bottom: 20%; left: 15%; width: 120px; height: 30px; clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%); }
        .shape:nth-child(4) { top: 30%; right: 5%; width: 60px; height: 60px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
        .shape:nth-child(5) { top: 50%; left: 8%; width: 90px; height: 90px; border-radius: 50%; border: 3px solid #333333; background: transparent; }
        .shape:nth-child(6) { bottom: 40%; right: 15%; width: 70px; height: 70px; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }
        
        @keyframes rotate-shape {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 星星效果 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #666666;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
        
        /* 主容器 */
        .container {
            text-align: center;
            padding: 50px 40px;
            background: linear-gradient(135deg, #fff9c4 0%, #ffff00 30%, #ffeb3b 70%, #ffff00 100%);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6), 0 0 60px rgba(255, 255, 0, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.5);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 10;
            border: 4px solid #ffd700;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            background: linear-gradient(45deg, #ffff00, #ffd700, #ffeb3b, #ffff00);
            background-size: 400% 400%;
            border-radius: 25px;
            z-index: -1;
            animation: borderGlow 3s ease infinite;
            opacity: 0.8;
        }
        
        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 角落装饰 */
        .corner-decorations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #000000;
        }
        
        .corner:nth-child(1) { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner:nth-child(2) { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner:nth-child(3) { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner:nth-child(4) { bottom: -8px; right: -8px; border-left: none; border-top: none; }
        
        /* 标题 */
        .title-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        .spike {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #000000;
            animation: spikePulse 0.5s ease-in-out infinite;
        }
        
        .spike:nth-child(1) { top: -25px; left: 5%; transform: rotate(-30deg); }
        .spike:nth-child(2) { top: -30px; left: 20%; transform: rotate(-15deg); }
        .spike:nth-child(3) { top: -35px; left: 35%; transform: rotate(0deg); }
        .spike:nth-child(4) { top: -30px; left: 50%; transform: rotate(15deg); }
        .spike:nth-child(5) { top: -25px; left: 65%; transform: rotate(30deg); }
        .spike:nth-child(6) { top: -20px; left: 80%; transform: rotate(45deg); }
        .spike:nth-child(7) { bottom: -25px; left: 10%; transform: rotate(30deg); }
        .spike:nth-child(8) { bottom: -30px; left: 25%; transform: rotate(15deg); }
        .spike:nth-child(9) { bottom: -35px; left: 45%; transform: rotate(0deg); }
        .spike:nth-child(10) { bottom: -30px; left: 60%; transform: rotate(-15deg); }
        .spike:nth-child(11) { bottom: -25px; left: 75%; transform: rotate(-30deg); }
        
        @keyframes spikePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-size: 52px;
            font-weight: bold;
            text-align: center;
            color: #000000;
            text-shadow: -2px -2px 0 #ffff00, 2px -2px 0 #ffff00, -2px 2px 0 #ffff00, 2px 2px 0 #ffff00, 0 0 10px rgba(255, 255, 0, 0.8), 0 0 20px rgba(255, 255, 0, 0.6);
            animation: pulse 0.8s ease-in-out infinite, flash 0.5s ease-in-out infinite;
            letter-spacing: 8px;
            margin: 0;
            padding: 10px 0;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .content {
            font-size: 18px;
            line-height: 1.8;
            color: #000000;
            margin-bottom: 40px;
            text-align: left;
            background: rgba(255, 255, 255, 0.6);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #000000;
            font-weight: 500;
        }
        
        .highlight {
            color: #dc2626;
            font-weight: bold;
            font-size: 20px;
        }
        
        .claim-btn {
            display: inline-block;
            padding: 18px 70px;
            font-size: 22px;
            font-weight: bold;
            color: #000000;
            background: linear-gradient(135deg, #fff9c4 0%, #ffff00 50%, #ffeb3b 100%);
            border: 3px solid #000000;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 0, 0.5);
            animation: pulse 0.8s ease-in-out infinite;
            position: relative;
            overflow: hidden;
            text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff;
        }
        
        .claim-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            100% { left: 100%; }
        }
        
        .claim-btn:hover {
            animation: none;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 255, 0, 0.6);
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: linear-gradient(135deg, #fff9c4 0%, #ffff00 100%);
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 255, 0, 0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.3s ease;
            border: 4px solid #000000;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
            animation: bounce 0.5s ease;
            border: 3px solid #000000;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .modal h2 {
            color: #000000;
            margin-bottom: 15px;
            font-size: 30px;
            font-weight: bold;
            text-shadow: -1px -1px 0 #ffff00, 1px -1px 0 #ffff00, -1px 1px 0 #ffff00, 1px 1px 0 #ffff00;
        }
        
        .modal p {
            color: #000000;
            font-size: 17px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.8);
            padding: 12px;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .close-btn {
            padding: 12px 40px;
            font-size: 17px;
            color: #000000;
            font-weight: bold;
            background: linear-gradient(135deg, #fff9c4 0%, #ffff00 100%);
            border: 2px solid #000000;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
